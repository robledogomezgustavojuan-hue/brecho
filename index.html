<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Brechó Inteligente | Sistema Completo</title>
  <style>
    :root { --primary: #6366f1; --danger: #ef4444; --success: #10b981; --bg: #f8fafc; }
    body { font-family: sans-serif; background: var(--bg); padding: 20px; }
    .card { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; margin-bottom: 20px; max-width: 600px; margin-left: auto; margin-right: auto; }
    .row { display: flex; gap: 10px; margin-bottom: 10px; }
    input { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    button { padding: 10px 15px; border-radius: 6px; border: none; cursor: pointer; color: white; font-weight: bold; }
    .btn-primary { background: var(--primary); }
    .btn-danger { background: var(--danger); }
    .btn-success { background: var(--success); }
    .btn-edit { background: #f59e0b; }
    li { list-style: none; border-bottom: 1px solid #eee; padding: 10px 0; display: flex; justify-content: space-between; align-items: center; }
  </style>
</head>
<body>

<div class="card">
    <h2>Brechó Inteligente</h2>
    <div class="row">
        <button class="btn-primary" onclick="setMode('LIVE')">🎥 Registrar Live</button>
        <button class="btn-primary" onclick="setMode('AVULSA')">🛍️ Venda Avulsa</button>
        <button class="btn-primary" onclick="loadSales()">📊 Ver Relatório</button>
    </div>
</div>

<div class="card" id="formArea">
    <h3 id="formTitle">Novo Registro</h3>
    <input type="text" id="code" placeholder="Código da Peça"><br><br>
    <input type="text" id="size" placeholder="Tamanho (P/M/G)"><br><br>
    <input type="number" id="value" placeholder="Valor (R$)"><br><br>
    <input type="text" id="client" placeholder="Nome do Cliente"><br><br>
    <button class="btn-success" id="saveBtn" onclick="saveSale()">Salvar Venda</button>
</div>

<div class="card" id="reportArea" style="display:none;">
    <h3>Relatório</h3>
    <ul id="salesList"></ul>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    // Credenciais inseridas conforme solicitado
    const firebaseConfig = {
      apiKey: "AIzaSyBLfJR31G2DKV38E4x6HFR-bY3tnH3Yrso",
      authDomain: "brecho-45532.firebaseapp.com",
      projectId: "brecho-45532",
      storageBucket: "brecho-45532.firebasestorage.app",
      messagingSenderId: "902600801735",
      appId: "1:902600801735:web:03b9e91d86f1543fdbade2"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    let mode = 'AVULSA';
    let editId = null;

    window.setMode = (m) => {
        mode = m;
        document.getElementById('formTitle').innerText = m === 'LIVE' ? 'Registrar na Live' : 'Venda Avulsa';
        document.getElementById('formArea').style.display = 'block';
        document.getElementById('reportArea').style.display = 'none';
        editId = null;
        document.getElementById('saveBtn').innerText = "Salvar Venda";
    };

    window.saveSale = async () => {
        const data = {
            code: document.getElementById('code').value,
            size: document.getElementById('size').value,
            value: parseFloat(document.getElementById('value').value),
            client: document.getElementById('client').value,
            mode: mode,
            storeId: auth.currentUser ? auth.currentUser.uid : 'anon'
        };

        if (editId) {
            await updateDoc(doc(db, 'sales', editId), data);
            alert("Venda atualizada!");
            editId = null;
            document.getElementById('saveBtn').innerText = "Salvar Venda";
        } else {
            await addDoc(collection(db, 'sales'), data);
            alert("Venda salva!");
        }

        // Limpeza dos campos
        document.getElementById('code').value = '';
        document.getElementById('size').value = '';
        document.getElementById('value').value = '';
        document.getElementById('client').value = '';
    };

    window.loadSales = async () => {
        document.getElementById('formArea').style.display = 'none';
        document.getElementById('reportArea').style.display = 'block';
        const list = document.getElementById('salesList');
        list.innerHTML = '';
        const snap = await getDocs(collection(db, 'sales'));
        snap.forEach(d => {
            const s = d.data();
            list.innerHTML += `<li>
                ${s.code} (${s.size}) - R$${s.value} | ${s.client}
                <div>
                    <button class="btn-edit" onclick="prepareEdit('${d.id}', '${s.code}', '${s.size}', ${s.value}, '${s.client}')">✏️</button>
                    <button class="btn-danger" onclick="deleteSale('${d.id}')">🗑️</button>
                </div>
            </li>`;
        });
    };

    window.prepareEdit = (id, code, size, value, client) => {
        editId = id;
        document.getElementById('code').value = code;
        document.getElementById('size').value = size;
        document.getElementById('value').value = value;
        document.getElementById('client').value = client;
        document.getElementById('formArea').style.display = 'block';
        document.getElementById('reportArea').style.display = 'none';
        document.getElementById('saveBtn').innerText = "Atualizar Venda";
    };

    window.deleteSale = async (id) => {
        if(confirm("Deseja apagar esta venda?")) {
            await deleteDoc(doc(db, 'sales', id));
            loadSales();
        }
    };
</script>
</body>
</html>
